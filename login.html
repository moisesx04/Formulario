<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>PureForm — Acceso</title>
  <meta name="description" content="Inicia sesión en PureForm para administrar tus formularios personalizados."/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<div class="login-bg">
  <div class="login-card animate-in">

    <div class="login-logo" style="flex-direction: column; align-items: center; text-align: center; gap: 15px;">
      <div style="margin-bottom: 5px;">
        <svg class="flag-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 741 390" style="width: 80px; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.35));">
          <path fill="#bf0a30" d="M0 0h741v30H0zM0 60h741v30H0zM0 120h741v30H0zM0 180h741v30H0zM0 240h741v30H0zM0 300h741v30H0zM0 360h741v30H0z"/>
          <path fill="#fff" d="M0 30h741v30H0zM0 90h741v30H0zM0 150h741v30H0zM0 210h741v30H0zM0 270h741v30H0zM0 330h741v30H0z"/>
          <path fill="#002868" d="M0 0h296.4v210H0z"/>
          <g fill="#fff">
            <g id="s18_login">
              <g id="s9_login">
                <g id="s5_login">
                  <g id="s_login">
                    <path id="p_login" d="M24.7 9.5l1.6 4.9h5.2l-4.2 3 1.6 4.9-4.2-3-4.2 3 1.6-4.9-4.2-3h5.2z"/>
                  </g>
                  <use href="#s_login" y="42"/>
                  <use href="#s_login" y="84"/>
                  <use href="#s_login" y="126"/>
                  <use href="#s_login" y="168"/>
                </g>
                <use href="#s5_login" x="49.4" y="21"/>
              </g>
              <use href="#s9_login" x="98.8"/>
            </g>
            <use href="#s18_login" x="197.6"/>
            <use href="#s5_login" x="247" y="21"/>
          </g>
        </svg>
      </div>
      <div class="login-logo__text">
        <h1 style="color: var(--usa-blue); line-height: 1; margin-bottom: 5px;">PureForm</h1>
        <p style="color: var(--gray-mid); margin: 0;">Panel de Administración</p>
      </div>
    </div>

    <div class="login-form">
      <div>
        <h2>Iniciar Sesión</h2>
        <p>Ingresa tus credenciales de administrador</p>
      </div>

      <div id="loginError" class="login-error" role="alert"></div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input class="form-control" type="email" id="email" placeholder="admin@ejemplo.com" required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>

      <button class="btn btn--primary w-full" id="loginBtn" style="justify-content:center; padding:14px;">
        Entrar al Panel
      </button>

      <button class="btn btn--ghost w-full" id="demoBtn" style="justify-content:center; padding:12px; margin-top:12px; border: 1px dashed var(--usa-blue); color: var(--usa-blue);">
        Acceso Demo (Sin contraseña)
      </button>
    </div>

    <p style="text-align:center; font-size:0.75rem; color:var(--gray-mid); margin-top:32px;">
      PureForm v1.0 — Solo acceso autorizado
    </p>
  </div>
</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
