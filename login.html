<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>PureForm — Acceso</title>
  <meta name="description" content="Inicia sesión en PureForm para administrar tus formularios personalizados."/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<div class="login-bg">
  <div class="login-card animate-in">

    <div class="login-logo">
      <div style="text-align: center; width: 100%; margin-bottom: 20px;">
        <svg class="flag-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 741 390" style="width: 60px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));">
          <path fill="#bf0a30" d="M0 0h741v30H0zM0 60h741v30H0zM0 120h741v30H0zM0 180h741v30H0zM0 240h741v30H0zM0 300h741v30H0zM0 360h741v30H0z"/>
          <path fill="#fff" d="M0 30h741v30H0zM0 90h741v30H0zM0 150h741v30H0zM0 210h741v30H0zM0 270h741v30H0zM0 330h741v30H0z"/>
          <path fill="#002868" d="M0 0h296.4v210H0z"/>
          <g fill="#fff">
            <g id="s18">
              <g id="s9">
                <g id="s5">
                  <g id="s">
                    <path id="p" d="M24.7 9.5l1.6 4.9h5.2l-4.2 3 1.6 4.9-4.2-3-4.2 3 1.6-4.9-4.2-3h5.2z"/>
                  </g>
                  <use href="#s" y="42"/>
                  <use href="#s" y="84"/>
                  <use href="#s" y="126"/>
                  <use href="#s" y="168"/>
                </g>
                <use href="#s5" x="49.4" y="21"/>
              </g>
              <use href="#s9" x="98.8"/>
            </g>
            <use href="#s18" x="197.6"/>
            <use href="#s5" x="247" y="21"/>
          </g>
        </svg>
      </div>
      <div class="login-logo__icon" style="background: var(--usa-blue); color: white;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M8 9h8M8 13h6M8 17h4"/>
        </svg>
      </div>
      <div class="login-logo__text">
        <h1 style="color: var(--usa-blue);">PureForm</h1>
        <p>Panel de Administración</p>
      </div>
    </div>

    <div class="login-form">
      <div>
        <h2>Iniciar Sesión</h2>
        <p>Ingresa tus credenciales de administrador</p>
      </div>

      <div id="loginError" class="login-error" role="alert"></div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input class="form-control" type="email" id="email" placeholder="admin@ejemplo.com" required autocomplete="email"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>

      <button class="btn btn--primary w-full" id="loginBtn" style="justify-content:center; padding:14px;">
        Entrar al Panel
      </button>
    </div>

    <p style="text-align:center; font-size:0.75rem; color:var(--gray-mid); margin-top:32px;">
      PureForm v1.0 — Solo acceso autorizado
    </p>
  </div>
</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
